<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>預約服務報名</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; }
        .container { max-width: 500px; margin-top: 30px; }
        .card { border-radius: 20px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header-bg { background-color: #06c755; color: white; border-radius: 20px 20px 0 0; padding: 25px; text-align: center; }
        .btn-submit { background-color: #06c755; color: white; border: none; border-radius: 12px; padding: 12px; font-weight: 600; width: 100%; transition: 0.3s; margin-top: 15px; }
        .btn-submit:disabled { background-color: #ccc; }
    </style>
</head>
<body>

<div class="container mb-5">
    <div class="card">
        <div class="header-bg">
            <h4 class="mb-0">📝 預約您的專屬服務</h4>
        </div>
        <div class="card-body p-4">
            <form id="bookingForm">
                <input type="hidden" id="userId">
                
                <div class="mb-3">
                    <label class="form-label">姓名</label>
                    <input type="text" class="form-control" id="name" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">聯絡電話</label>
                    <input type="tel" class="form-control" id="phone" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">需求項目</label>
                    <select class="form-select" id="project" required>
                        <option value="" disabled selected>請選擇服務項目</option>
                        <option value="網站">🌐 網站開發設計</option>
                        <option value="攝影">📸 專業攝影服務</option>
                        <option value="line">💬 LINE 官方帳號建置</option>
                        <option value="平面設計">🎨 平面視覺設計</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">預約日期</label>
                    <input type="date" class="form-control" id="date" required onchange="updateTimeSlots()">
                </div>

                <div class="mb-3">
                    <label class="form-label">預約時段</label>
                    <select class="form-select" id="time" required disabled>
                        <option value="" disabled selected>請先選擇日期</option>
                    </select>
                </div>

                <button type="button" id="submitBtn" class="btn btn-submit" disabled>載入資料中...</button>
            </form>
        </div>
    </div>
</div>

<script>
    let bookedSlots = [];
    // 這裡可以自訂你每天開放的時段
    const availableTimes = ["10:00", "13:00", "15:00", "17:00", "19:00"]; 

    async function initSystem() {
        try {
            // 1. 取得已經被預約的時段
            const res = await fetch('/api/get_slots');
            const data = await res.json();
            bookedSlots = data.booked || [];

            // 2. 初始化 LIFF
            await liff.init({ liffId: "{{ liff_id }}" });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById('userId').value = profile.userId;
                
                // 設定日期只能選今天以後
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('date').setAttribute('min', today);

                const btn = document.getElementById('submitBtn');
                btn.innerText = "確認送出預約";
                btn.disabled = false;
                btn.onclick = handleSubmit;
            } else {
                liff.login();
            }
        } catch (err) {
            console.error(err);
            alert('系統載入失敗，請在 LINE 內重新開啟');
        }
    }

    // 當日期改變時，更新下拉選單
    function updateTimeSlots() {
        const selectedDate = document.getElementById('date').value;
        const timeSelect = document.getElementById('time');
        
        timeSelect.innerHTML = '<option value="" disabled selected>請選擇時段</option>';
        if (!selectedDate) {
            timeSelect.disabled = true;
            return;
        }

        timeSelect.disabled = false;
        
        availableTimes.forEach(time => {
            // 組合格式例如："2026-03-20_14:00" 來跟後端比對
            const targetFormat = `${selectedDate}_${time}`;
            const isBooked = bookedSlots.includes(targetFormat);
            
            const option = document.createElement('option');
            option.value = time;
            option.innerText = isBooked ? `${time} (已被預約)` : time;
            if (isBooked) option.disabled = true;
            
            timeSelect.appendChild(option);
        });
    }

    async function handleSubmit() {
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const project = document.getElementById('project').value;
        const date = document.getElementById('date').value;
        const time = document.getElementById('time').value;
        const userId = document.getElementById('userId').value;

        if (!name || !phone || !project || !date || !time) {
            return alert('請完整填寫所有預約資訊喔！');
        }

        const btn = document.getElementById('submitBtn');
        btn.innerText = "資料傳送中...";
        btn.disabled = true;

        try {
            const response = await fetch('/api/submit_form', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, name, phone, project, date, time })
            });
            if ((await response.json()).status === "success") {
                liff.closeWindow();
            } else {
                alert('伺服器忙碌中，請稍後再試');
                btn.innerText = "確認送出預約";
                btn.disabled = false;
            }
        } catch (error) {
            alert('連線失敗，請檢查網路狀態');
            btn.innerText = "確認送出預約";
            btn.disabled = false;
        }
    }
    
    window.onload = initSystem;
</script>
</body>
</html>
