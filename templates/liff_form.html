<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>預約服務報名</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .container { max-width: 500px; margin-top: 30px; }
        .card { border-radius: 20px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header-bg { background-color: #06c755; color: white; border-radius: 20px 20px 0 0; padding: 25px; text-align: center; }
        .btn-submit { background-color: #06c755; color: white; border: none; border-radius: 12px; padding: 12px; font-weight: 600; width: 100%; transition: 0.3s; }
        .btn-submit:disabled { background-color: #ccc; }
        .form-label { font-weight: 500; color: #495057; }
        .form-control, .form-select { border-radius: 10px; padding: 12px; border: 1px solid #dee2e6; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header-bg">
            <h4 class="mb-0">📝 預約您的專屬服務</h4>
            <p class="mb-0 mt-2" style="font-size: 0.9rem; opacity: 0.9;">請填寫下方資訊，我們將儘速聯繫您</p>
        </div>
        <div class="card-body p-4">
            <form id="bookingForm">
                <input type="hidden" id="userId">

                <div class="mb-3">
                    <label for="name" class="form-label">姓名</label>
                    <input type="text" class="form-control" id="name" placeholder="請輸入您的真實姓名" required>
                </div>

                <div class="mb-3">
                    <label for="phone" class="form-label">聯絡電話</label>
                    <input type="tel" class="form-control" id="phone" placeholder="例如：0912345678" required>
                </div>

                <div class="mb-4">
                    <label for="project" class="form-label">需求項目</label>
                    <select class="form-select" id="project" required>
                        <option value="" disabled selected>請選擇服務項目</option>
                        <option value="網站">🌐 網站開發設計</option>
                        <option value="攝影">📸 專業攝影服務</option>
                        <option value="line">💬 LINE 官方帳號建置</option>
                        <option value="平面設計">🎨 平面視覺設計</option>
                    </select>
                </div>

                <button type="button" id="submitBtn" class="btn btn-submit" disabled>正在載入 LINE 資訊...</button>
            </form>
        </div>
    </div>
</div>

<script>
    // 初始化 LIFF
    async function initLIFF() {
        try {
            await liff.init({ liffId: "{{ liff_id }}" });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById('userId').value = profile.userId;
                
                // 載入完成，啟用按鈕
                const btn = document.getElementById('submitBtn');
                btn.innerText = "確認送出預約";
                btn.disabled = false;
                btn.onclick = handleSubmit;
            } else {
                liff.login();
            }
        } catch (err) {
            console.error('LIFF 初始化失敗', err);
            alert('請在 LINE 內開啟此網頁');
        }
    }

    // 處理表單送出
    async function handleSubmit() {
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const project = document.getElementById('project').value;
        const userId = document.getElementById('userId').value;

        if (!name || !phone || !project) {
            alert('請完整填寫所有欄位喔！');
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.innerText = "資料傳送中...";
        btn.disabled = true;

        try {
            const response = await fetch('/api/submit_form', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: userId,
                    name: name,
                    phone: phone,
                    project: project
                })
            });

            const result = await response.json();
            if (result.status === "success") {
                // 送出成功後關閉視窗
                liff.closeWindow();
            } else {
                alert('系統忙碌中，請稍後再試');
                btn.innerText = "確認送出預約";
                btn.disabled = false;
            }
        } catch (error) {
            console.error('送出失敗', error);
            alert('連線失敗，請檢查網路狀態');
            btn.innerText = "確認送出預約";
            btn.disabled = false;
        }
    }

    window.onload = initLIFF;
</script>

</body>
</html>
