<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>預約服務報名</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .container { max-width: 500px; margin-top: 30px; }
        .card { border-radius: 20px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header-bg { background-color: #06c755; color: white; border-radius: 20px 20px 0 0; padding: 25px; text-align: center; }
        .btn-submit { background-color: #06c755; color: white; border: none; border-radius: 12px; padding: 12px; font-weight: 600; width: 100%; transition: 0.3s; margin-top: 10px; }
        .btn-submit:disabled { background-color: #ccc; }
        .form-label { font-weight: 500; color: #495057; }
        .form-control, .form-select { border-radius: 10px; padding: 12px; border: 1px solid #dee2e6; }
    </style>
</head>
<body>

<div class="container mb-5">
    <div class="card">
        <div class="header-bg">
            <h4 class="mb-0">📝 預約您的專屬服務</h4>
        </div>
        <div class="card-body p-4">
            <form id="bookingForm">
                <input type="hidden" id="userId">
                
                <div class="mb-3">
                    <label class="form-label">姓名 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="name" placeholder="請輸入真實姓名" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">聯絡電話 <span class="text-danger">*</span></label>
                    <input type="tel" class="form-control" id="phone" placeholder="例如：0912345678" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">需求項目 <span class="text-danger">*</span></label>
                    <select class="form-select" id="project" required>
                        <option value="" disabled selected>請選擇服務項目</option>
                        <option value="網站">🌐 網站開發設計</option>
                        <option value="攝影">📸 專業攝影服務</option>
                        <option value="line">💬 LINE 官方帳號建置</option>
                        <option value="平面設計">🎨 平面視覺設計</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">額外需求備註</label>
                    <textarea class="form-control" id="remarks" rows="4" placeholder="請告訴我們您的想法、偏好風格，或是希望聯絡的時間等資訊..."></textarea>
                </div>

                <button type="button" id="submitBtn" class="btn btn-submit" disabled>系統載入中...</button>
            </form>
        </div>
    </div>
</div>

<script>
    async function initSystem() {
        try {
            await liff.init({ liffId: "{{ liff_id }}" });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById('userId').value = profile.userId;
                
                const btn = document.getElementById('submitBtn');
                btn.innerText = "確認送出預約";
                btn.disabled = false;
                btn.onclick = handleSubmit;
            } else {
                liff.login();
            }
        } catch (err) {
            console.error(err);
            alert('系統載入失敗，請在 LINE 內重新開啟');
        }
    }

    async function handleSubmit() {
        const payload = {
            userId: document.getElementById('userId').value,
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            project: document.getElementById('project').value,
            remarks: document.getElementById('remarks').value
        };

        // 簡單驗證防呆
        if (!payload.name || !payload.phone || !payload.project) {
            return alert('請完整填寫姓名、電話與需求項目喔！');
        }

        const btn = document.getElementById('submitBtn');
        btn.innerText = "資料傳送中...";
        btn.disabled = true;

        try {
            const response = await fetch('/api/submit_form', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if ((await response.json()).status === "success") {
                liff.closeWindow(); // 成功後直接關閉視窗
            } else {
                alert('伺服器忙碌中，請稍後再試');
                btn.innerText = "確認送出預約";
                btn.disabled = false;
            }
        } catch (error) {
            alert('連線失敗，請檢查網路狀態');
            btn.innerText = "確認送出預約";
            btn.disabled = false;
        }
    }
    
    window.onload = initSystem;
</script>
</body>
</html>
