<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>需求報名表</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: sans-serif; padding: 20px;}
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1);}
        .btn-submit { background-color: #06c755; color: white; border-radius: 10px; font-weight: bold;}
    </style>
</head>
<body>
    <div class="card p-4 mt-2">
        <h3 class="text-center mb-4" style="color: #06c755;">📝 預約服務</h3>
        <form id="regForm">
            <input type="hidden" id="userId" name="userId">
            
            <div class="mb-3">
                <label class="form-label text-muted">您的姓名</label>
                <input type="text" class="form-control form-control-lg" id="name" placeholder="請輸入真實姓名" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-muted">聯絡電話</label>
                <input type="tel" class="form-control form-control-lg" id="phone" placeholder="09xxxxxxxx" required>
            </div>
            
            <div class="mb-4">
                <label class="form-label text-muted">需求項目</label>
                <select class="form-select form-select-lg" id="project" required>
                    <option value="" disabled selected>請選擇您需要的服務</option>
                    <option value="網站">網頁設計</option>
                    <option value="攝影">專業攝影</option>
                    <option value="LINE">LINE 官方帳號</option>
                    <option value="平面設計">平面設計</option>
                </select>
            </div>

            <button type="button" class="btn btn-submit btn-lg w-100" id="submitBtn" disabled>讀取中...</button>
        </form>
    </div>

    <script>
        async function initializeLiff() {
            try {
                await liff.init({ liffId: "{{ liff_id }}" }); 
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    document.getElementById('userId').value = profile.userId;
                    
                    const btn = document.getElementById('submitBtn');
                    btn.innerText = "確認送出";
                    btn.disabled = false;
                    btn.onclick = submitForm;
                } else {
                    liff.login();
                }
            } catch (err) {
                alert("請在 LINE App 中開啟此網頁喔！");
            }
        }

        async function submitForm() {
            const userId = document.getElementById('userId').value;
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const project = document.getElementById('project').value; // 抓取下拉選單的值

            // 防呆機制：檢查是否三個欄位都有填寫
            if(!name || !phone || !project) {
                alert("請填寫完整資料並選擇項目喔！"); 
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.innerText = "資料傳送中..."; 
            btn.disabled = true;

            try {
                // 將多出來的 project 一起打包送出
                const response = await fetch('/api/submit_form', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: userId, name: name, phone: phone, project: project })
                });
                
                const result = await response.json();
                if(result.status === "success") {
                    liff.closeWindow(); 
                } else {
                    alert("錯誤: " + result.message);
                    btn.innerText = "確認送出"; 
                    btn.disabled = false;
                }
            } catch (error) {
                alert("系統連線錯誤，請稍後再試！");
                btn.innerText = "確認送出"; 
                btn.disabled = false;
            }
        }
        
        window.onload = initializeLiff;
    </script>
</body>
</html>
